<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Color Palette</h1>

<div class="color-palette">
    <div class="color-swatch" style="background-color: #3437D1;">
        <p class="color-swatch__text color-swatch__text--light">3437D1</p>
    </div>
    <div class="color-swatch" style="background-color: #EC9437;">
        <p class="color-swatch__text color-swatch__text--dark">EC9437</p>
    </div>
    <div class="color-swatch" style="background-color: #2E2525;">
        <p class="color-swatch__text color-swatch__text--light">2E2525</p>
    </div>
    <div class="color-swatch" style="background-color: #FEFCFD;">
        <p class="color-swatch__text color-swatch__text--dark">FEFCFD</p>
    </div>
    <div class="color-swatch" style="background-color: #D0CFCF;">
        <p class="color-swatch__text color-swatch__text--dark">D0CFCF</p>
    </div>
</div>    <div class="color-swatch" style="background-color: #2E2525;">


</body>
</html>
